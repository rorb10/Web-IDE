<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web IDE</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <span>Workspace - Web IDE</span>
    </header>
    
    <div class="main-container">
        <div class="sidebar">
            <h3>EXPLORER</h3>
            <p> src</p>
            <p>&nbsp;&nbsp; index.html</p>
            <p>&nbsp;&nbsp; style.css</p>
            <p>&nbsp;&nbsp; script.js</p>
        </div>
        
        <div class="editor-area">
            <div class="editor">
                <p><span style="color:#569cd6;">function</span> <span style="color:#dcdcaa;">startAssignment</span>() {</p>
                <p>&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:#9cdcfe;">console</span>.<span style="color:#dcdcaa;">log</span>(<span style="color:#ce9178;">"파일 분리 및 모듈화 완료!"</span>);</p>
                <p>}</p>
            </div>
            
            <div class="terminal">
                <div class="terminal-header">Terminal</div>
                <p style="color: #3fb950;">user@workspace:~$ <span style="color: #cccccc; animation: blink 1s step-end infinite;">_</span></p>
            </div>
        </div>
    </div>
</body>
</html>
