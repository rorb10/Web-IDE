<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Web IDE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <div>Workspace - Web IDE</div>
    <button id="loginBtn" onclick="openAuthModal('login')">로그인</button>
  </header>

  <main class="ide-layout">
    <aside class="sidebar">
      <div class="sidebar-title">EXPLORER</div>
      <ul>
        <li>src</li>
        <li class="active">index.html</li>
        <li>style.css</li>
        <li>script.js</li>
      </ul>
    </aside>

    <section class="editor">
      <div class="tab">index.html</div>
      <pre class="code">
&lt;!DOCTYPE html&gt;
&lt;html lang="ko"&gt;
&lt;head&gt;
  &lt;title&gt;Web IDE Project&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
  &lt;h1&gt;Welcome to My Web IDE!&lt;/h1&gt;
  &lt;p&gt;로그인/회원가입 기능이 연결되었습니다.&lt;/p&gt;
&lt;/body&gt;
&lt;/html&gt;
      </pre>
    </section>
  </main>

  <section class="bottom-panel">
    <div class="panel-tabs">
      <button class="active">TERMINAL</button>
      <button>TEAM CHAT</button>
    </div>
    <div class="terminal">
      user@workspace:~$
    </div>
  </section>

  <!-- 로그인 / 회원가입 모달 -->
  <div id="authModal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modalTitle">로그인</h2>

      <input id="emailInput" type="email" placeholder="이메일">
      <input id="passwordInput" type="password" placeholder="비밀번호">

      <button id="submitBtn" onclick="submitAuth()">로그인</button>

      <p id="switchText">
        계정이 없나요?
        <button onclick="switchAuthMode()">회원가입</button>
      </p>

      <button class="close-btn" onclick="closeAuthModal()">닫기</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
